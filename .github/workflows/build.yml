name: MoonVault CI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Compilar renderer React
        run: npm run build:renderer

      - name: Baixar yt-dlp (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          Invoke-WebRequest `
            -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" `
            -OutFile "bin\yt-dlp.exe"
          if (-not (Test-Path "bin\yt-dlp.exe") -or (Get-Item "bin\yt-dlp.exe").Length -eq 0) {
            throw "yt-dlp download failed or file is empty"
          }

      - name: Baixar ffmpeg real (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path bin | Out-Null

          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          $zip = "ffmpeg.zip"
          $tmp = "ffmpeg_tmp"
          $maxAttempts = 3
          $ok = $false

          for ($i = 1; $i -le $maxAttempts; $i++) {
            if (Test-Path $zip) { Remove-Item $zip -Force }
            if (Test-Path $tmp) { Remove-Item $tmp -Recurse -Force }

            try {
              Invoke-WebRequest -Uri $url -OutFile $zip
              if (-not (Test-Path $zip)) { throw "zip não foi criado" }

              $zipSize = (Get-Item $zip).Length
              if ($zipSize -lt 10000000) { throw "zip pequeno demais: $zipSize bytes" }

              Expand-Archive -Path $zip -DestinationPath $tmp -Force

              $ffmpeg = Get-ChildItem -Path $tmp -Recurse -Filter "ffmpeg.exe" |
                Where-Object { $_.FullName -match "\\bin\\ffmpeg\.exe$" } |
                Sort-Object Length -Descending |
                Select-Object -First 1

              if (-not $ffmpeg) { throw "ffmpeg.exe não encontrado após extração" }
              if ($ffmpeg.Length -lt 1000000) { throw "ffmpeg.exe extraído inválido: $($ffmpeg.Length) bytes" }

              Copy-Item $ffmpeg.FullName -Destination "bin\ffmpeg.exe" -Force

              if (-not (Test-Path "bin\ffmpeg.exe")) { throw "bin\ffmpeg.exe não foi criado" }

              $finalSize = (Get-Item "bin\ffmpeg.exe").Length
              if ($finalSize -lt 1000000) { throw "bin\ffmpeg.exe inválido: $finalSize bytes" }

              $ok = $true
              break
            } catch {
              Write-Host "Tentativa $i falhou: $($_.Exception.Message)"
              if ($i -eq $maxAttempts) { throw }
              Start-Sleep -Seconds (5 * $i)
            }
          }

          if (-not $ok) { throw "Falha ao preparar ffmpeg.exe" }

          Remove-Item $tmp -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item $zip -Force -ErrorAction SilentlyContinue

      - name: Verificar binários
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if (-not (Test-Path "bin\ffmpeg.exe")) { throw "ffmpeg.exe ausente" }
          if (-not (Test-Path "bin\yt-dlp.exe")) { throw "yt-dlp.exe ausente" }

          $ffmpegSize = (Get-Item "bin\ffmpeg.exe").Length
          $ytDlpSize = (Get-Item "bin\yt-dlp.exe").Length

          if ($ffmpegSize -lt 1000000) { throw "ffmpeg.exe parece corrompido (menor que 1 MB)" }
          if ($ytDlpSize -lt 100000) { throw "yt-dlp.exe parece inválido" }

          Get-ChildItem bin | Format-Table Name, Length

      - name: Build Windows (installer + portable)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run publish:win:ci

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Compilar renderer React
        run: npm run build:renderer

      - name: Baixar yt-dlp e instalar ffmpeg (Linux)
        run: |
          mkdir -p bin
          curl -fL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o bin/yt-dlp
          chmod +x bin/yt-dlp
          sudo apt-get install -y ffmpeg
          cp $(which ffmpeg) bin/ffmpeg
          chmod +x bin/ffmpeg

      - name: Verificar binários
        run: |
          echo "=== bin/ contents ==="
          ls -lh bin/
          [ -s bin/ffmpeg ] || (echo "ffmpeg is missing or empty" && exit 1)
          [ -s bin/yt-dlp  ] || (echo "yt-dlp is missing or empty" && exit 1)

      - name: Build Linux AppImage
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run publish:linux:ci
